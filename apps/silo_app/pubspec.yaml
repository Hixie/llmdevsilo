name: silo_app
description: "Flutter client for llmdevsilo harnesses (desktop, mobile, web)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.13.0-149.0.dev

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.0
  file_selector: ^1.0.3
  provider: ^6.1.2
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App icon masters are generated by tool/generate_icon.swift; see that script
# for the design. Apply with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "#1E423A"
  # The maskable master keeps the mark inside the central 60%, so no further
  # inset is needed.
  adaptive_icon_foreground: "assets/icon/icon_maskable.png"
  adaptive_icon_foreground_inset: 0
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#1E423A"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#1E423A"
    theme_color: "#356859"
  macos:
    generate: true
    image_path: "assets/icon/icon_macos.png"
